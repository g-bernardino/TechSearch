{% load static %}
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto | TechSearch</title>
    <link rel="stylesheet" href="{% static 'css/cadastro-produto.css' %}">
</head>
<body>

    <div class="cadastro-box">
        <h1>Cadastrar Produto</h1>
        <p>Adicione um novo produto à TechSearch</p>

        <form method="POST" enctype="multipart/form-data" action="{% url 'cadastro_produto' %}">
            {% csrf_token %}

            <div class="input-group">
                <label for="nome">Nome do Produto</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome do produto" required>
            </div>

            <div class="input-group">
                <label for="categoria">Categoria</label>
                <select id="categoria" name="categoria" required>
                    <option value="">Selecione uma categoria</option>
                    <option value="Notebook">Notebook</option>
                    <option value="Celular">Celular</option>
                    <option value="Monitor">Monitor</option>
                    <option value="Teclado">Teclado</option>
                    <option value="Mouse">Mouse</option>
                </select>
            </div>

            <div class="input-group">
                <label for="preco">Preço (R$)</label>
                <input type="number" step="0.01" id="preco" name="preco" placeholder="0,00" required>
            </div>

            <div class="input-group">
                <label for="quantidade">Quantidade em Estoque</label>
                <input type="number" id="quantidade" name="quantidade" placeholder="Quantidade">
            </div>

            <div class="input-group">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" name="descricao" rows="4" placeholder="Descrição detalhada do produto"></textarea>
            </div>

            <div class="input-group">
                <label for="imagem">Imagem do Produto</label>
                <input type="file" id="imagem" name="imagem" accept="image/*">
            </div>

            <button type="submit">Cadastrar Produto</button>
        </form>
    </div>

</body>
</html>
