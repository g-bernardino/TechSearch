{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TechSearch</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="logo">TechSearch</div>
    
    <form class="form" id="loginForm" method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      
      {% if messages %}
        <div class="messages" style="margin-bottom: 15px; text-align: center; color: #ff4757; font-size: 0.9rem;">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <h2>Entrar</h2>

      <div class="input-group">
        <input type="text" id="username" name="username" placeholder="Email ou Usuário" required>
        <i class="fas fa-envelope"></i>
      </div>

      <div class="input-group">
        <input type="password" id="password" name="password" placeholder="Senha" required>
        <i class="fas fa-lock"></i>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" name="remember"> Lembrar-me
        </label>
        <a href="#" class="forgot-password">Esqueceu a senha?</a>
      </div>

      <button type="submit" id="loginBtn">
        <span class="btn-text">Entrar</span>
      </button>

      <div class="redirect">
        <p>Não tem conta? 
          <a href="{% url 'cadastro' %}">Cadastre-se</a>
        </p>
        <p>
          <a href="{% url 'home' %}">← Voltar para loja</a>
        </p>
      </div>
    </form>
  </div>

  <footer class="auth-footer-bottom">
    <p>&copy; 2026 TechSearch. Todos os direitos reservados.</p>
  </footer>
  <script src="{% static 'js/cadastro.js' %}"></script>
  </body>
</html>
