<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tela de Pagamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/pagamento.css' %}">
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="payment-container">
        <h2>Pagamento</h2>
        <form method="POST" id="paymentForm">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Nome completo" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="number" name="amount" placeholder="Valor (R$)" required>
            <input type="text" name="card_number" placeholder="Número do cartão" maxlength="16" required>
            <input type="text" name="expiry_date" placeholder="MM/AA" maxlength="5" required>
            <input type="text" name="cvv" placeholder="CVV" maxlength="3" required>
            <button type="submit">Finalizar Pagamento</button>
        </form>
    </div>
    <script src="{% static 'js/pagamento.js' %}"></script>
</body>
</html>
