{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - TechSearch</title>
  <link rel="stylesheet" href="{% static 'css/cadastro.css' %}">
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="logo">TechSearch</div>
    
    <form class="form" id="registerForm" method="POST" action="{% url 'cadastro' %}">
      {% csrf_token %} <!-- Chave de segurança CSRF inserida aqui -->
      
      <h2>Cadastro</h2>

      <!-- Bloco que exibe erros de validação vindos do banco de dados (ex: Senha fraca, user já existe) -->
      {% if messages %}
        <div class="alert-container" style="margin-bottom: 15px; text-align: center; color: #ff4757; font-size: 0.9rem;">
          {% for message in messages %}
            <div class="alert-msg">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      <div class="input-group">
        <input type="text" id="name" name="username" placeholder="Nome" required>
        <i class="fas fa-user"></i>
      </div>

      <div class="input-group">
        <input type="email" id="email" name="email" placeholder="Email" required>
        <i class="fas fa-envelope"></i>
      </div>

      <div class="input-group">
        <input type="password" id="password" name="password1" placeholder="Senha" required>
        <i class="fas fa-lock"></i>
      </div>

      <div class="input-group">
        <input type="password" id="confirmPassword" name="password2" placeholder="Confirmar Senha" required>
        <i class="fas fa-lock"></i>
      </div>

      <button type="submit">Cadastrar</button>

      <div class="redirect">
        <p>Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>
      </div>
    </form>
  </div>

  <footer class="auth-footer-bottom">
    <p>&copy; 2026 TechSearch. Todos os direitos reservados.</p>
  </footer>

  <script src="{% static 'js/cadastro.js' %}"></script>
</body>
</html>
