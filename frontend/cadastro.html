{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastre-se</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body class="auth-body">
  <div class="auth-form">
    <h2>Cadastre-se</h2>
    <form>
      <input type="text" placeholder="Nome de usuário" required>
      <input type="email" placeholder="E-mail" required>
      <input type="tel" placeholder="Número de telefone" required>
      <input type="password" placeholder="Senha" required>

      <label class="checkbox-container">
        <input type="checkbox">
        Desejo receber emails com ofertas exclusivas
      </label>

      <button type="submit">FINALIZAR CADASTRO</button>
    </form>
  </div>
</body>
</html>

<script>
  document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const usuario = document.querySelector('input[placeholder="Nome de usuário"]').value;
    const email = document.querySelector('input[placeholder="E-mail"]').value;
    const telefone = document.querySelector('input[placeholder="Número de telefone"]').value;
    const senha = document.querySelector('input[placeholder="Senha"]').value;
    const ofertas = document.querySelector('input[type="checkbox"]').checked;

    const dados = { usuario, email, telefone, senha, ofertas };

    localStorage.setItem("techsearchUser", JSON.stringify(dados));
    alert("Cadastro realizado com sucesso!");
    window.location.href = "{% url 'login' %}";
  });
</script>
