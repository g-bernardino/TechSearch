{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSearch | Criar Conta</title>
    
    <link rel="stylesheet" href="{% static 'static:css/style.css' %}">
    <link rel="stylesheet" href="{% static 'static:css/cadastro.css' %}">
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-wrapper">

    <div class="container">
        <h1 class="logo">TechSearch</h1>
        
        <form class="form" method="POST">
            {% csrf_token %}
            <h2>Criar Nova Conta</h2>

            {% if form.errors %}
            <div class="error-container">
                <p>Verifique os dados informados. As senhas devem coincidir e ter no mínimo 8 caracteres.</p>
            </div>
            {% endif %}

            <div class="input-group">
                <input type="text" name="username" required placeholder="Nome de Usuário" value="{{ form.username.value|default:'' }}">
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <input type="password" name="password1" required placeholder="Senha (mín. 8 caracteres)">
                <i class="fas fa-lock"></i>
            </div>

            <div class="input-group">
                <input type="password" name="password2" required placeholder="Confirmar Senha">
                <i class="fas fa-shield-halved"></i>
            </div>

            <button type="submit" class="btn-auth">FINALIZAR CADASTRO</button>

            <div class="auth-footer">
                <p class="redirect">Já possui uma conta? <a href="{% url 'login' %}">Faça Login</a></p>
                <p class="redirect back-link"><a href="{% url 'home' %}">← Voltar para a Loja</a></p>
            </div>
        </form>
    </div>

</body>
</html>
