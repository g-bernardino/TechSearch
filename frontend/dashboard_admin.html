{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="{% static 'static:admin.css' %}">
    <style>
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px; }
        .form-container { background: #15191d; padding: 30px; border-radius: 15px; border: 1px solid #00e5ff; }
        .input-group { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid #2d333b; color: white; border-radius: 8px; }
        
        /* Dropzone Interativa */
        .drop-zone { height: 150px; border: 2px dashed #00e5ff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { background: rgba(0, 229, 255, 0.1); }
        
        /* Preview em Tempo Real */
        .preview-label { color: #00e5ff; font-weight: bold; margin-bottom: 10px; display: block; }
        .live-preview { transform: scale(1.1); transform-origin: top left; }
    </style>
</head>
<body style="background: #0b0e11; color: white;">

    <div class="admin-grid">
        <div class="form-container">
            <h2>Novo Produto TechSearch</h2>
            <form id="productForm">
                <div class="input-group">
                    <input type="text" id="inNome" placeholder="Nome do Produto" oninput="updatePreview()">
                </div>
                <div class="input-group">
                    <input type="number" id="inPreco" placeholder="Preço (R$)" oninput="updatePreview()">
                </div>
                <div class="input-group">
                    <div class="drop-zone" id="dropZone">
                        <span>Arrasta a imagem aqui ou clica</span>
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>
                </div>
                <button type="button" class="btn-aproveitar" style="width: 100%;" onclick="saveProduct()">CADASTRAR PRODUTO</button>
            </form>
        </div>

        <div>
            <span class="preview-label">PREVIEW EM TEMPO REAL:</span>
            <div class="live-preview" id="previewContainer">
                <div class="produto-card">
                    <div class="produto-img-container">
                        <img id="prevImg" src="https://via.placeholder.com/200" alt="Preview">
                    </div>
                    <div class="produto-info">
                        <h3 id="prevNome">Nome do Produto</h3>
                        <p class="preco-atual" id="prevPreco">R$ 0,00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica de Preview Instantâneo
        function updatePreview() {
            document.getElementById('prevNome').innerText = document.getElementById('inNome').value || "Nome do Produto";
            document.getElementById('prevPreco').innerText = "R$ " + (document.getElementById('inPreco').value || "0,00");
        }

        // Lógica de Drag & Drop
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('prevImg').src = e.target.result;
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
